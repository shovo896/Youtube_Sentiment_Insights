<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Sentiment Insights</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #18202a;
        --muted: #657184;
        --line: #dfe5ee;
        --accent: #2563eb;
        --positive: #16803c;
        --neutral: #687386;
        --negative: #c3332f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 420px;
        min-height: 560px;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        padding: 14px 16px 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
      }

      main {
        padding: 14px 16px 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      input,
      select {
        width: 100%;
        height: 34px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        font: inherit;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 108px;
        gap: 10px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 92px;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        min-height: 20px;
        margin: 12px 0 0;
        color: var(--muted);
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 14px;
      }

      .metric {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 3px;
        font-size: 20px;
      }

      .positive strong {
        color: var(--positive);
      }

      .neutral strong {
        color: var(--neutral);
      }

      .negative strong {
        color: var(--negative);
      }

      .section {
        margin-top: 14px;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 13px;
      }

      .image-panel {
        min-height: 112px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .image-panel img {
        display: block;
        width: 100%;
        height: auto;
      }

      .results {
        max-height: 190px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .row {
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 8px;
        padding: 9px 10px;
        border-bottom: 1px solid var(--line);
      }

      .row:last-child {
        border-bottom: 0;
      }

      .badge {
        align-self: start;
        width: 76px;
        padding: 3px 6px;
        border-radius: 999px;
        text-align: center;
        font-size: 11px;
        font-weight: 700;
      }

      .badge.positive {
        background: #e8f7ee;
        color: var(--positive);
      }

      .badge.neutral {
        background: #eef1f5;
        color: var(--neutral);
      }

      .badge.negative {
        background: #fdeceb;
        color: var(--negative);
      }

      .comment {
        margin: 0;
        color: #2b3441;
      }

      .empty {
        padding: 14px;
        color: var(--muted);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>YouTube Sentiment Insights</h1>
    </header>

    <main>
      <div class="controls">
        <div>
          <label for="apiUrl">API URL</label>
          <input id="apiUrl" type="url" value="http://127.0.0.1:5000">
        </div>
        <div>
          <label for="limit">Comments</label>
          <select id="limit">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="analyzeBtn" class="primary" type="button">Analyze Current Video</button>
        <button id="clearBtn" type="button">Clear</button>
      </div>

      <p id="status" class="status">Open a YouTube video page, scroll near comments if needed, then analyze.</p>

      <section id="summary" class="summary hidden" aria-label="Sentiment summary">
        <div class="metric positive">
          <span>Positive</span>
          <strong id="positiveCount">0</strong>
        </div>
        <div class="metric neutral">
          <span>Neutral</span>
          <strong id="neutralCount">0</strong>
        </div>
        <div class="metric negative">
          <span>Negative</span>
          <strong id="negativeCount">0</strong>
        </div>
      </section>

      <section id="chartSection" class="section hidden">
        <h2>Distribution</h2>
        <div class="image-panel">
          <img id="chartImage" alt="Sentiment distribution chart">
        </div>
      </section>

      <section id="wordcloudSection" class="section hidden">
        <h2>Word Cloud</h2>
        <div class="image-panel">
          <img id="wordcloudImage" alt="Comment word cloud">
        </div>
      </section>

      <section class="section">
        <h2>Comments</h2>
        <div id="results" class="results">
          <div class="empty">No analysis yet.</div>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
